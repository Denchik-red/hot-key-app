services:
  minio:
    image: minio/minio
    container_name: minio-s3
    ports:
      - '9000:9000' # API порт (для кода)
      - '9001:9001' # Web UI порт (для глаз)
    env_file:
      - .env
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data:
